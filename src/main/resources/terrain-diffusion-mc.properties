# Terrain Diffusion MC configuration

# Scale factor for terrain: blocks per native 30m pixel.
# scale=1 → 30m/block, scale=2 → 15m/block, scale=4 → 7.5m/block.
scale=2

# Inference device: "cpu", "gpu", or "auto" (try GPU then fall back to CPU).
inference.device=auto

# ADVANCED
# Gamma and c of terrain (Mod applies elev -> ((elev + c)^gamma - c^gamma) before dividing by (30 / scale)).
# I tried experimenting with this to boost low-elevation relief, but didn't really see any improvements. Maybe I missed something.
height_converter.gamma=1.0
height_converter.c=30.0