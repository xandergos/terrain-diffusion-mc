# Terrain Diffusion MC configuration

# Inference device: "cpu", "gpu", or "auto" (try GPU first then fall back to CPU).
# Ignored for the CPU build.
inference.device=gpu

# Offload inactive models from VRAM so only one model occupies the GPU at a time.
# Keeps peak VRAM to 1.5-2 GB. Set to false if you have ~2.5+ GB of free VRAM for
# slightly faster generation (avoids reloading sessions between pipeline stages).
inference.offload_models=true

# Validate SHA-256 for pre-existing files in .minecraft/terrain-diffusion-models.
# Set to false to allow custom user-provided models/config without hash checks.
validate_model=true

# Port for the local terrain explorer web UI (started with /td-explore command).
explorer.port=19801

# Terrain generation region side length in blocks. Must be a power of 2.
# Examples: 128, 256, 512, 1024.
# Use larger values to generate in larger batches (more chunks per second)
# Use smaller values to generate in smaller batches (most responsive)
tile_size=256

# Maximum concurrent inference workers. Mainly helps when C2ME or another worldgen
# parallelizer is installed: multiple chunk worker threads can have their tile
# requests overlap (especially the speculative prefetch of neighbor tiles) instead
# of queueing sequentially.
#
# Auto-clamped to 1 (no concurrency) in these modes because concurrency would hurt:
#   - inference.device=cpu        : ONNX Runtime already does intra-op CPU parallelism;
#                                   concurrent sessions oversubscribe cores.
#   - inference.offload_models=true : every concurrent runModel call thrashes the GPU
#                                     slot lock, swapping models in/out of VRAM.
#
# To actually use >1 thread, set inference.offload_models=false (requires ~2.5+ GB
# free VRAM since all three models stay resident).
inference.threads=2